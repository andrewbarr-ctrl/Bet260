<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

h1 { color: #00ff88; }

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  background: #444;
  cursor: not-allowed;
}

.small {
  color: #aaa;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000</h2>

<div class="box">
  <h3>Games</h3>
  <div id="games">Loading matches...</div>
</div>

<div class="box">
  <h3>My Bets</h3>
  <div id="bets"></div>
</div>

<div class="box">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>

// =====================
// STATE
// =====================
let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

// =====================
// SAVE
// =====================
function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

// =====================
// UI
// =====================
function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

// =====================
// LOAD MATCHES (FIXED URL)
// =====================
async function loadMatches() {
  try {
    const res = await fetch("https://curly-union-9418.andrewbarr.workers.dev/");
    const data = await res.json();

    matches = (data.matches || []).slice(0, 10);

    renderMatches();

  } catch (err) {
    console.log(err);
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

// =====================
// RENDER MATCHES
// =====================
function renderMatches() {
  let html = "";

  matches.forEach(m => {

    const open = m.status === "TIMED" || m.status === "SCHEDULED";

    const homeScore = m.score?.fullTime?.home ?? "-";
    const awayScore = m.score?.fullTime?.away ?? "-";

    html += `
      <div class="box">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>

        <p>Status: ${m.status}</p>

        <p class="small">Score: ${homeScore} - ${awayScore}</p>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.homeTeam.name}', ${m.id})">
          Pick ${m.homeTeam.name}
        </button>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.awayTeam.name}', ${m.id})">
          Pick ${m.awayTeam.name}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

// =====================
// BET SYSTEM
// =====================
function bet(team, id) {

  if (balance < 100) return alert("Not enough balance");

  balance -= 100;

  bets.push({
    team,
    gameId: id,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderBets();
}

// =====================
// BETS UI
// =====================
function renderBets() {
  const active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map(b => `${b.team} - $100`).join("<br>")
      : "No active bets";
}

// =====================
// HISTORY UI
// =====================
function renderHistory() {
  const done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b => `${b.team} - ${b.status}`).join("<br>")
      : "No history yet";
}

// =====================
// RESULT CHECKER (FIXED SAFE VERSION)
// =====================
function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m) return;

    if (m.status === "FINISHED") {

      const home = m.score?.fullTime?.home ?? 0;
      const away = m.score?.fullTime?.away ?? 0;

      let winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.status === "ACTIVE") {
        if (b.team === winner) {
          b.status = "WON";
          balance += 200;
        } else {
          b.status = "LOST";
        }
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

// =====================
// LOOP
// =====================
setInterval(() => {
  loadMatches();
  checkResults();
}, 20000);

// START
loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
