<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽ PRO MAX</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  background: #111823;
  position: sticky;
  top: 0;
}

.topbar button {
  background: #00ff88;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

h1 { color: #00ff88; }

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled { background: #444; }

.small {
  font-size: 12px;
  color: #aaa;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modalBox {
  background: #151c24;
  width: 300px;
  margin: 20% auto;
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>Bet260 ⚽ PRO MAX</h1>
<h2 id="balance">Balance: $1000</h2>

<div class="topbar">
  <button onclick="show('games')">Games</button>
  <button onclick="show('bets')">Bets</button>
  <button onclick="show('history')">History</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
</div>

<div class="box">
  <h3>Bet Amount</h3>
  <input id="betAmount" type="number" value="100">
</div>

<div id="games"></div>
<div id="bets" style="display:none" class="box"></div>
<div id="history" style="display:none" class="box"></div>
<div id="leaderboard" style="display:none" class="box"></div>

<!-- BET MODAL -->
<div id="modal">
  <div class="modalBox">
    <h3>Confirm Bet</h3>
    <p id="modalText"></p>
    <button onclick="confirmBet()">Confirm</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

const API = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];
let pendingBet = null;

// leaderboard (local fake users)
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) ?? [
  {name:"You", score: balance},
  {name:"AI_Bot1", score: 1200},
  {name:"AI_Bot2", score: 900}
];

// sounds
function sound(type){
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.connect(ctx.destination);

  if(type === "win") o.frequency.value = 700;
  if(type === "lose") o.frequency.value = 200;
  if(type === "cash") o.frequency.value = 500;

  o.start();
  setTimeout(()=>o.stop(),150);
}

function save(){
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
  localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
}

function updateUI(){
  document.getElementById("balance").innerText =
    "Balance: $" + balance;
}

function show(tab){

  document.getElementById("games").style.display = tab==="games"?"block":"none";
  document.getElementById("bets").style.display = tab==="bets"?"block":"none";
  document.getElementById("history").style.display = tab==="history"?"block":"none";
  document.getElementById("leaderboard").style.display = tab==="leaderboard"?"block":"none";

  if(tab==="leaderboard") renderLeaderboard();
}

// LIVE ODDS
function odds(id){
  return (1.2 + (id % 7)*0.3 + Math.random()*0.2).toFixed(2);
}

async function load(){
  const res = await fetch(API);
  const data = await res.json();
  matches = data.matches || [];
  renderMatches();
}

function renderMatches(){

  let html = "";

  matches.forEach(m=>{

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";
    const o = odds(m.id);

    html += `
      <div class="box">
        <b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b>

        <div class="small">Odds: ${o}x</div>
        <div class="small">${m.status}</div>

        <div class="small">${home} - ${away}</div>

        <button onclick="openBet('${m.homeTeam.name}',${m.id},${o})">
          Bet Home
        </button>

        <button onclick="openBet('${m.awayTeam.name}',${m.id},${o})">
          Bet Away
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

// BET SLIP
function openBet(team,id,odds){

  let amt = parseInt(document.getElementById("betAmount").value);

  if(!amt || amt>balance) return alert("Invalid bet");

  pendingBet = {team,id,odds,amt};

  document.getElementById("modalText").innerText =
    `${team} | $${amt} | ${odds}x`;

  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  pendingBet=null;
}

function confirmBet(){

  balance -= pendingBet.amt;

  bets.push({
    ...pendingBet,
    status:"ACTIVE"
  });

  closeModal();
  save();
  updateUI();
  renderBets();
}

// BETS
function renderBets(){

  let active = bets.filter(b=>b.status==="ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length ?
    active.map((b,i)=>
      `${b.team} $${b.amt} (${b.odds}x)
      <button onclick="cashOut(${bets.indexOf(b)})">Cash Out</button><br>`
    ).join("")
    : "No active bets";
}

// CASH OUT
function cashOut(i){

  let b = bets[i];
  if(!b || b.status!=="ACTIVE") return;

  let win = Math.floor(b.amt*b.odds*0.8);

  balance += win;
  b.status="CASHED";

  sound("cash");

  save();
  updateUI();
  renderBets();
  renderHistory();
}

// HISTORY + WIN CHECK
function check(){

  bets.forEach(b=>{

    let m = matches.find(x=>x.id===b.id);
    if(!m || b.status!=="ACTIVE") return;

    if(m.status==="FINISHED"){

      let w =
        m.score.fullTime.home > m.score.fullTime.away
        ? m.homeTeam.name
        : m.awayTeam.name;

      if(b.team===w){
        b.status="WON";
        balance += Math.floor(b.amt*b.odds*2);
        sound("win");
      } else {
        b.status="LOST";
        sound("lose");
      }
    }
  });

  updateLeaderboard();

  save();
  updateUI();
  renderBets();
  renderHistory();
}

function renderHistory(){

  let done = bets.filter(b=>b.status!=="ACTIVE");

  document.getElementById("history").innerHTML =
    done.map(b=>`${b.team} - ${b.status} - $${b.amt}`).join("<br>");
}

// LEADERBOARD
function updateLeaderboard(){

  leaderboard[0].score = balance;

  leaderboard.sort((a,b)=>b.score-a.score);

  save();
}

function renderLeaderboard(){

  document.getElementById("leaderboard").innerHTML =
    leaderboard.map(l=>`${l.name} - $${l.score}`).join("<br>");
}

// LOOP
setInterval(()=>{
  load();
  check();
},10000);

// START
load();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
