<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  background: #111823;
  position: sticky;
  top: 0;
}

.topbar button {
  background: #00ff88;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

h1 { color: #00ff88; }

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  background: #444;
  cursor: not-allowed;
}

.small {
  color: #aaa;
  font-size: 12px;
}

/* SELECTED TEAM HIGHLIGHT */
.selected {
  border: 2px solid yellow;
  box-shadow: 0 0 10px yellow;
}
</style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000</h2>

<!-- TOP NAV -->
<div class="topbar">
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('bets')">Bets</button>
  <button onclick="showTab('history')">History</button>
</div>

<!-- BET AMOUNT -->
<div class="box">
  <h3>Bet Amount</h3>
  <input type="number" id="betAmount" value="100" min="1">
</div>

<!-- GAMES -->
<div id="gamesTab" class="box">
  <h3>Games</h3>
  <div id="games">Loading matches...</div>
</div>

<!-- BETS -->
<div id="betsTab" class="box" style="display:none">
  <h3>My Bets</h3>
  <div id="bets"></div>
</div>

<!-- HISTORY -->
<div id="historyTab" class="box" style="display:none">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>

// =====================
// API
// =====================
const API_URL = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

// =====================
// SAVE
// =====================
function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

// =====================
// UI
// =====================
function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

// =====================
// TABS
// =====================
function showTab(tab) {
  document.getElementById("gamesTab").style.display = tab === "games" ? "block" : "none";
  document.getElementById("betsTab").style.display = tab === "bets" ? "block" : "none";
  document.getElementById("historyTab").style.display = tab === "history" ? "block" : "none";
}

// =====================
// LOAD MATCHES (WORKER)
// =====================
async function loadMatches() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    matches = data.matches || [];
    renderMatches();

  } catch (err) {
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

// =====================
// RENDER MATCHES
// =====================
function renderMatches() {
  let html = "";

  matches.forEach(m => {

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";

    const open = m.status === "TIMED" || m.status === "SCHEDULED";

    html += `
      <div class="box">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>

        <p class="small">${m.status}</p>
        <p class="small">Score: ${home} - ${away}</p>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.homeTeam.name}', ${m.id}, this)">
          Bet ${m.homeTeam.name}
        </button>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.awayTeam.name}', ${m.id}, this)">
          Bet ${m.awayTeam.name}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

// =====================
// BET FUNCTION (ANY AMOUNT)
// =====================
function bet(team, id, btn) {

  let amount = parseInt(document.getElementById("betAmount").value);

  if (!amount || amount <= 0) {
    alert("Enter valid bet amount");
    return;
  }

  if (amount > balance) {
    alert("Not enough balance!");
    return;
  }

  // highlight button
  btn.classList.add("selected");

  balance -= amount;

  bets.push({
    team,
    gameId: id,
    amount,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderBets();
}

// =====================
// BETS
// =====================
function renderBets() {

  const active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map(b =>
          `${b.team} - $${b.amount}`
        ).join("<br>")
      : "No active bets";
}

// =====================
// HISTORY
// =====================
function renderHistory() {

  const done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b =>
          `${b.team} - ${b.status} - $${b.amount}`
        ).join("<br>")
      : "No history yet";
}

// =====================
// CHECK RESULTS
// =====================
function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m) return;

    if (m.status === "FINISHED" && b.status === "ACTIVE") {

      const home = m.score.fullTime.home;
      const away = m.score.fullTime.away;

      const winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.team === winner) {
        b.status = "WON";
        balance += b.amount * 2;
      } else {
        b.status = "LOST";
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

// =====================
// LOOP
// =====================
setInterval(() => {
  loadMatches();
  checkResults();
}, 20000);

// =====================
// START
// =====================
loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
