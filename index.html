<!DOCTYPE html>
<html>
<head>
  <title>Bet260 ⚽</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f14;
      color: #e6e6e6;
      margin: 0;
      text-align: center;
    }

    h1 { color: #00ff88; }

    .nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #111821;
      position: sticky;
      top: 0;
    }

    .nav button {
      background: #00ff88;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      background: #151c24;
      margin: 10px auto;
      padding: 15px;
      width: 92%;
      max-width: 700px;
      border-radius: 12px;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 8px 10px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
    }

    .selected {
      background: gold !important;
      color: black;
    }

    .small {
      color: #aaa;
      font-size: 12px;
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      width: 90px;
    }
  </style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000 USD</h2>

<div class="nav">
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('bets')">Bets</button>
  <button onclick="showTab('history')">History</button>
</div>

<div id="gamesTab">
  <div class="box">
    <h3>Games</h3>
    <div id="games">Loading...</div>
  </div>
</div>

<div id="betsTab" style="display:none;">
  <div class="box">
    <h3>My Bets</h3>
    <div id="bets"></div>
  </div>
</div>

<div id="historyTab" style="display:none;">
  <div class="box">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>

const API_URL = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

// 🎵 SOUND SYSTEM
function sound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  if (type === "bet") o.frequency.value = 600;
  if (type === "win") o.frequency.value = 900;
  if (type === "lose") o.frequency.value = 200;

  g.gain.value = 0.1;
  o.start();
  setTimeout(() => o.stop(), 150);
}

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

function showTab(tab) {
  document.getElementById("gamesTab").style.display = tab === "games" ? "block" : "none";
  document.getElementById("betsTab").style.display = tab === "bets" ? "block" : "none";
  document.getElementById("historyTab").style.display = tab === "history" ? "block" : "none";
}

// LOAD DATA
async function loadMatches() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    matches = data.matches || [];
    renderMatches();
  } catch (e) {
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

// ⛔ STRICT BETTING RULE
function canBet(match) {
  if (match.status !== "TIMED") return false;

  const now = new Date();
  const start = new Date(match.utcDate);

  // extra safety: block if match already started
  return start > now;
}

// RENDER MATCHES
function renderMatches() {
  let html = "";

  matches.forEach(m => {

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";

    const alreadyBet = bets.find(b => b.gameId === m.id);

    const allowed = canBet(m);

    const start = new Date(m.utcDate);
    const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);

    html += `
      <div class="box">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>

        <p>Status: ${m.status}</p>

        <p class="small">
          Starts: ${start.toLocaleString()} <br>
          Ends: ${end.toLocaleString()}
        </p>

        <input type="number" id="amt-${m.id}" value="100" ${allowed ? "" : "disabled"} />

        <br/>

        <button
          class="${alreadyBet?.team === m.homeTeam.name ? "selected" : ""}"
          ${(!allowed || alreadyBet) ? "disabled" : ""}
          onclick="placeBet('${m.homeTeam.name}', ${m.id})">
          ${m.homeTeam.name}
        </button>

        <button
          class="${alreadyBet?.team === m.awayTeam.name ? "selected" : ""}"
          ${(!allowed || alreadyBet) ? "disabled" : ""}
          onclick="placeBet('${m.awayTeam.name}', ${m.id})">
          ${m.awayTeam.name}
        </button>

        ${!allowed ? `<p class="small">Betting CLOSED</p>` : ""}
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

// PLACE BET (100% SAFE)
function placeBet(team, id) {

  const match = matches.find(m => m.id === id);

  if (!match || !canBet(match)) {
    alert("Betting closed!");
    return;
  }

  if (bets.find(b => b.gameId === id)) {
    alert("Already bet!");
    return;
  }

  const amt = Number(document.getElementById("amt-" + id).value);

  if (!amt || amt <= 0 || amt > balance) {
    alert("Invalid amount");
    return;
  }

  balance -= amt;

  bets.push({
    team,
    gameId: id,
    amount: amt,
    status: "ACTIVE"
  });

  sound("bet");

  save();
  updateUI();
  renderMatches();
  renderBets();
}

// BETS
function renderBets() {
  const active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map(b => `${b.team} - $${b.amount}`).join("<br>")
      : "No active bets";
}

// HISTORY
function renderHistory() {
  const done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b => `${b.team} - ${b.status} ($${b.amount})`).join("<br>")
      : "No history yet";
}

// RESULTS CHECK
function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m) return;

    if (m.status === "FINISHED" && b.status === "ACTIVE") {

      const home = m.score.fullTime.home;
      const away = m.score.fullTime.away;

      let winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.team === winner) {
        b.status = "WON";
        balance += b.amount * 2;
        sound("win");
      } else {
        b.status = "LOST";
        sound("lose");
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

// LOOP
setInterval(() => {
  loadMatches();
  checkResults();
}, 15000);

// START
loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
