```html
<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0b0f14;
  color:white;
  margin:0;
  text-align:center;
}

h1{
  color:#00ff88;
}

.box{
  background:#151c24;
  margin:12px auto;
  padding:15px;
  width:90%;
  max-width:700px;
  border-radius:12px;
}

button{
  background:#00ff88;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  background:#555;
  cursor:not-allowed;
}

.small{
  color:#aaa;
}
</style>

</head>
<body>

<h1>Bet260 ⚽</h1>

<h2 id="balance">Balance: $1000</h2>

<div class="box">
  <h3>Games</h3>
  <div id="games">Loading...</div>
</div>

<div class="box">
  <h3>My Bets</h3>
  <div id="bets">No active bets</div>
</div>

<div class="box">
  <h3>History</h3>
  <div id="history">No history yet</div>
</div>

<script>

let balance =
Number(localStorage.getItem("balance")) || 1000;

let bets =
JSON.parse(localStorage.getItem("bets")) || [];

let matches = [];

function saveData(){
  localStorage.setItem("balance",balance);
  localStorage.setItem("bets",JSON.stringify(bets));
}

function updateBalance(){
  document.getElementById("balance").innerText =
  "Balance: $" + balance;
}

async function loadMatches(){

  try{

    const res = await fetch(
      "https://curly-union-9418.andrewbarr.workers.dev"
    );

    const data = await res.json();

    matches = data.matches || [];

    renderMatches();
    checkResults();

  }catch(err){

    document.getElementById("games").innerHTML =
    "Failed to load matches";

    console.error(err);

  }
}

function renderMatches(){

  let html = "";

  matches.forEach(m=>{

    const open =
    m.status === "TIMED" ||
    m.status === "SCHEDULED";

    const homeScore =
    m.score?.fullTime?.home ?? "-";

    const awayScore =
    m.score?.fullTime?.away ?? "-";

    let statusText = "";

    if(open){
      statusText = "🟢 Betting Open";
    }else if(
      m.status === "IN_PLAY" ||
      m.status === "LIVE"
    ){
      statusText = "🟡 Live";
    }else{
      statusText = "🔴 Finished";
    }

    html += `
      <div class="box">

        <h3>${m.homeTeam.name} vs ${m.awayTeam.name}</h3>

        <p>${statusText}</p>

        <p class="small">
          Score: ${homeScore} - ${awayScore}
        </p>

        <button
        ${open ? "" : "disabled"}
        onclick="placeBet('${m.homeTeam.name}',${m.id})">
        Bet ${m.homeTeam.name}
        </button>

        <button
        ${open ? "" : "disabled"}
        onclick="placeBet('${m.awayTeam.name}',${m.id})">
        Bet ${m.awayTeam.name}
        </button>

      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function placeBet(team,gameId){

  if(balance < 100){
    alert("Not enough balance");
    return;
  }

  balance -= 100;

  bets.push({
    team:team,
    gameId:gameId,
    amount:100,
    status:"ACTIVE"
  });

  saveData();

  updateBalance();
  renderBets();
}

function renderBets(){

  const active =
  bets.filter(b=>b.status==="ACTIVE");

  document.getElementById("bets").innerHTML =
  active.length
  ? active.map(
    b=>`${b.team} - $${b.amount}`
  ).join("<br>")
  : "No active bets";
}

function renderHistory(){

  const done =
  bets.filter(b=>b.status!=="ACTIVE");

  document.getElementById("history").innerHTML =
  done.length
  ? done.map(
    b=>`${b.team} - ${b.status}`
  ).join("<br>")
  : "No history yet";
}

function checkResults(){

  bets.forEach(b=>{

    const m =
    matches.find(x=>x.id===b.gameId);

    if(!m) return;

    if(
      m.status==="FINISHED" &&
      b.status==="ACTIVE"
    ){

      const home =
      m.score.fullTime.home;

      const away =
      m.score.fullTime.away;

      let winner = null;

      if(home > away){
        winner = m.homeTeam.name;
      }

      if(away > home){
        winner = m.awayTeam.name;
      }

      if(b.team === winner){

        b.status = "WON";

        balance += 200;

      }else{

        b.status = "LOST";
      }

    }

  });

  saveData();

  updateBalance();
  renderBets();
  renderHistory();
}

updateBalance();
renderBets();
renderHistory();

loadMatches();

setInterval(loadMatches,15000);

</script>

</body>
</html>
```
