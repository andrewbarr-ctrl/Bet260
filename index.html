<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

h1 { color: #00ff88; }

.topnav {
  position: sticky;
  top: 0;
  background: #111922;
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
  z-index: 1000;
}

.topnav button {
  background: #00ff88;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.page {
  display: none;
  padding: 10px;
}

.active {
  display: block;
}

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  background: #444;
  cursor: not-allowed;
}

.small {
  color: #aaa;
  font-size: 12px;
}

.selected {
  border: 2px solid #00ff88;
  box-shadow: 0 0 10px #00ff88;
}
</style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000</h2>

<!-- NAV -->
<div class="topnav">
  <button onclick="showPage('games')">⚽ Games</button>
  <button onclick="showPage('bets')">💰 Bets</button>
  <button onclick="showPage('history')">📜 History</button>
</div>

<!-- BET AMOUNT -->
<div class="box">
  <h3>Bet Amount</h3>
  <button onclick="setAmount(10)">$10</button>
  <button onclick="setAmount(50)">$50</button>
  <button onclick="setAmount(100)">$100</button>
  <button onclick="setAmount(200)">$200</button>
  <p class="small">Selected: $<span id="amount">100</span></p>
</div>

<!-- GAMES -->
<div id="gamesPage" class="page active">
  <div class="box">
    <h3>Games</h3>
    <div id="games">Loading...</div>
  </div>
</div>

<!-- BETS -->
<div id="betsPage" class="page">
  <div class="box">
    <h3>Your Bets</h3>
    <div id="bets"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="historyPage" class="page">
  <div class="box">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>

const API = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];
let betAmount = 100;

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

function setAmount(a) {
  betAmount = a;
  document.getElementById("amount").innerText = a;
}

function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page + "Page").classList.add("active");
}

async function loadMatches() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    matches = (data.matches || []).slice(0, 10);
    renderMatches();

  } catch (e) {
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

function renderMatches() {
  let html = "";

  matches.forEach(m => {

    const open = m.status === "TIMED" || m.status === "SCHEDULED";

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";

    const betOn = bets.find(b => b.gameId === m.id && b.status === "ACTIVE");

    html += `
      <div class="box ${betOn ? 'selected' : ''}">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>
        <p>Status: ${m.status}</p>
        <p class="small">Score: ${home} - ${away}</p>

        <button ${open ? "" : "disabled"} onclick="bet('${m.homeTeam.name}', ${m.id})">
          Bet ${m.homeTeam.name} ($${betAmount})
        </button>

        <button ${open ? "" : "disabled"} onclick="bet('${m.awayTeam.name}', ${m.id})">
          Bet ${m.awayTeam.name} ($${betAmount})
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function bet(team, id) {

  if (bets.some(b => b.gameId === id && b.status === "ACTIVE")) {
    alert("You already bet on this match!");
    return;
  }

  if (balance < betAmount) {
    alert("Not enough balance!");
    return;
  }

  balance -= betAmount;

  bets.push({
    team,
    gameId: id,
    amount: betAmount,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderBets();
}

function renderBets() {
  const active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map(b => `${b.team} - $${b.amount}`).join("<br>")
      : "No active bets";
}

function renderHistory() {
  const done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b => `${b.team} - ${b.status} ($${b.amount})`).join("<br>")
      : "No history yet";
}

function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m) return;

    if ((m.status === "FINISHED" || m.status === "PAUSED") && b.status === "ACTIVE") {

      const home = m.score?.fullTime?.home ?? 0;
      const away = m.score?.fullTime?.away ?? 0;

      let winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.team === winner) {
        b.status = "WON";
        balance += b.amount * 2;
      } else {
        b.status = "LOST";
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

setInterval(() => {
  loadMatches();
  checkResults();
}, 60000);

loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
