<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽ PRO MAX GAME</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

h1 { color: #00ff88; }

.topbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: #111823;
  position: sticky;
  top: 0;
}

.topbar button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 6px 10px;
  margin: 4px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled { background:#444; }

.small {
  font-size: 12px;
  color:#aaa;
}

.selected {
  border: 2px solid yellow;
  box-shadow: 0 0 10px yellow;
}

.popup {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  background: #151c24;
  padding: 20px;
  border-radius: 12px;
  display:none;
}
</style>
</head>

<body>

<h1>Bet260 ⚽ GAME</h1>
<h2 id="balance">Balance: $1000</h2>

<div class="topbar">
  <button onclick="show('games')">Games</button>
  <button onclick="show('bets')">Bets</button>
  <button onclick="show('history')">History</button>
  <button onclick="show('leaderboard')">Leaderboard</button>
  <button onclick="dailyReward()">Daily Reward</button>
  <button onclick="spin()">Spin</button>
</div>

<div class="box">
  Bet Amount:
  <input id="amt" type="number" value="100">
</div>

<div id="games"></div>
<div id="bets" style="display:none" class="box"></div>
<div id="history" style="display:none" class="box"></div>
<div id="leaderboard" style="display:none" class="box"></div>

<div class="popup" id="popup"></div>

<script>

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];
let streak = 0;

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) ?? [
  {name:"You", score:balance},
  {name:"AI_1", score:1200},
  {name:"AI_2", score:900}
];

const API = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

function save(){
  localStorage.setItem("balance",JSON.stringify(balance));
  localStorage.setItem("bets",JSON.stringify(bets));
  localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
}

function updateUI(){
  document.getElementById("balance").innerText =
    "Balance: $" + balance + " | Streak: " + streak;
}

function show(tab){
  games.style.display = tab==="games"?"block":"none";
  bets.style.display = tab==="bets"?"block":"none";
  history.style.display = tab==="history"?"block":"none";
  leaderboard.style.display = tab==="leaderboard"?"block":"none";

  if(tab==="leaderboard") renderLB();
}

// AI %
function aiChance(){ return Math.floor(40+Math.random()*60); }

// ODDS
function odds(id){ return (1.2+(id%6)*0.4).toFixed(2); }

async function load(){
  let r = await fetch(API);
  let d = await r.json();
  matches = d.matches || [];
  render();
}

function render(){
  let h="";

  matches.forEach(m=>{
    let ai = aiChance();

    h+=`
    <div class="box">
      <b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b>
      <div class="small">AI Win Chance: ${ai}%</div>
      <div class="small">Odds: ${odds(m.id)}x</div>

      <button onclick="bet('${m.homeTeam.name}',${m.id})">Home</button>
      <button onclick="bet('${m.awayTeam.name}',${m.id})">Away</button>
    </div>`;
  });

  games.innerHTML=h;
}

function bet(team,id){

  let amt = +document.getElementById("amt").value;
  if(amt>balance||amt<=0) return alert("Invalid");

  balance-=amt;

  bets.push({team,id,amt,status:"ACTIVE"});

  save();
  updateUI();
  renderBets();
}

function renderBets(){
  let a=bets.filter(b=>b.status==="ACTIVE");

  bets.innerHTML=a.length?
  a.map(b=>`${b.team} $${b.amt}`).join("<br>")
  :"No bets";
}

function renderHistory(){
  let d=bets.filter(b=>b.status!=="ACTIVE");

  history.innerHTML=d.map(b=>`${b.team} - ${b.status}`).join("<br>");
}

// SPIN
function spin(){
  let r=[0,50,100,200,500][Math.floor(Math.random()*5)];
  balance+=r;
  popup("Spin +"+r);
  save();updateUI();
}

// DAILY
function dailyReward(){
  let last=localStorage.getItem("daily");
  let today=new Date().toDateString();

  if(last!==today){
    balance+=200;
    localStorage.setItem("daily",today);
    popup("Daily +200");
  }
  save();updateUI();
}

function popup(t){
  let p=document.getElementById("popup");
  p.style.display="block";
  p.innerText=t;
  setTimeout(()=>p.style.display="none",1500);
}

// CHECK RESULTS
function check(){

  bets.forEach(b=>{

    let m=matches.find(x=>x.id===b.id);
    if(!m||b.status!=="ACTIVE")return;

    if(m.status==="FINISHED"){

      let win =
        m.score.fullTime.home>m.score.fullTime.away
        ? m.homeTeam.name
        : m.awayTeam.name;

      if(b.team===win){
        b.status="WON";
        streak++;

        let payout=b.amt*2;
        if(streak>=3)payout*=1.5;

        balance+=payout;
      } else {
        b.status="LOST";
        streak=0;
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
  updateLB();
}

// LEADERBOARD
function updateLB(){
  leaderboard[0].score=balance;
  leaderboard.sort((a,b)=>b.score-a.score);
  save();
}

function renderLB(){
  leaderboard.innerHTML=
    leaderboard.map(l=>`${l.name} - $${l.score}`).join("<br>");
}

setInterval(()=>{load();check();},10000);

load();
updateUI();

</script>

</body>
</html>
