<!DOCTYPE html>
<html>
<head>
<title>Bet260</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

h1 { color: #00ff88; }

.box {
  background:#151c24;
  margin:10px auto;
  padding:15px;
  width:90%;
  max-width:600px;
  border-radius:12px;
}

button {
  background:#00ff88;
  border:none;
  padding:8px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

button:disabled {
  background:#555;
  cursor:not-allowed;
}

.nav button {
  background:#1a222d;
  color:white;
}
</style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000</h2>

<div class="box">
  <h3>Games</h3>
  <div id="games">Loading matches...</div>
</div>

<div class="box">
  <h3>My Bets</h3>
  <div id="bets"></div>
</div>

<div class="box">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>

const API_KEY = "93e8109cc47447ebb4940f749d92a0dc"; 

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

async function loadMatches() {
  try {
    const res = await fetch("https://api.football-data.org/v4/matches", {
      headers: { "X-Auth-Token": API_KEY }
    });

    const data = await res.json();

    matches = data.matches.slice(0, 6);

    renderMatches();
  } catch (err) {
    document.getElementById("games").innerHTML = "API not loaded (add key)";
  }
}

function renderMatches() {
  let html = "";

  matches.forEach(m => {

    let open = m.status === "SCHEDULED";

    html += `
      <div class="box">
        <p>${m.homeTeam.name} vs ${m.awayTeam.name}</p>
        <p>Status: ${m.status}</p>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.homeTeam.name}', ${m.id})">
          Bet ${m.homeTeam.name}
        </button>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.awayTeam.name}', ${m.id})">
          Bet ${m.awayTeam.name}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function bet(team, id) {
  if (balance < 100) return alert("No money!");

  balance -= 100;

  bets.push({
    team,
    gameId: id,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderBets();
}

function renderBets() {
  document.getElementById("bets").innerHTML =
    bets.filter(b => b.status === "ACTIVE")
      .map(b => `${b.team} - $100`)
      .join("<br>") || "No bets";
}

function renderHistory() {
  document.getElementById("history").innerHTML =
    bets.filter(b => b.status !== "ACTIVE")
      .map(b => `${b.team} - ${b.status}`)
      .join("<br>") || "No history";
}

function update() {
  save();
  updateUI();
  renderBets();
  renderHistory();
}

setInterval(loadMatches, 30000);

loadMatches();
updateUI();

</script>

</body>
</html>
