<!DOCTYPE html>
<html>
<head>
<title>Bet260 ⚽ PRO</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

.topbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 10px;
  background: #111823;
  position: sticky;
  top: 0;
}

.topbar button {
  background: #00ff88;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

h1 { color: #00ff88; }

.box {
  background: #151c24;
  margin: 10px auto;
  padding: 15px;
  width: 92%;
  max-width: 700px;
  border-radius: 12px;
}

button {
  background: #00ff88;
  border: none;
  padding: 8px 10px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled {
  background: #444;
}

.selected {
  border: 2px solid yellow;
  box-shadow: 0 0 10px yellow;
}

.small {
  color: #aaa;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>Bet260 ⚽ PRO</h1>
<h2 id="balance">Balance: $1000</h2>

<div class="topbar">
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('bets')">Bets</button>
  <button onclick="showTab('history')">History</button>
</div>

<div class="box">
  <h3>Bet Amount</h3>
  <input type="number" id="betAmount" value="100">
</div>

<div id="gamesTab" class="box">
  <h3>Games</h3>
  <div id="games">Loading...</div>
</div>

<div id="betsTab" class="box" style="display:none">
  <h3>My Bets</h3>
  <div id="bets"></div>
</div>

<div id="historyTab" class="box" style="display:none">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script>

const API_URL = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

// win streak bonus
let streak = 0;

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function updateUI() {
  document.getElementById("balance").innerText =
    "Balance: $" + balance + " | Streak: " + streak;
}

function showTab(tab) {
  document.getElementById("gamesTab").style.display = tab === "games" ? "block" : "none";
  document.getElementById("betsTab").style.display = tab === "bets" ? "block" : "none";
  document.getElementById("historyTab").style.display = tab === "history" ? "block" : "none";
}

// stable odds per match
function getOdds(id) {
  return (1.2 + (id % 5) * 0.4).toFixed(2);
}

async function loadMatches() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    matches = data.matches || [];
    renderMatches();

  } catch {
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

function renderMatches() {

  let html = "";

  matches.forEach(m => {

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";
    const odds = getOdds(m.id);

    const open = m.status === "TIMED";

    html += `
      <div class="box">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>

        <p class="small">Odds: ${odds}x</p>
        <p class="small">Status: ${m.status}</p>
        <p class="small">Score: ${home} - ${away}</p>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.homeTeam.name}', ${m.id}, ${odds}, this)">
          Bet ${m.homeTeam.name}
        </button>

        <button ${open ? "" : "disabled"}
          onclick="bet('${m.awayTeam.name}', ${m.id}, ${odds}, this)">
          Bet ${m.awayTeam.name}
        </button>
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

function bet(team, id, odds, btn) {

  let amount = parseInt(document.getElementById("betAmount").value);

  if (!amount || amount > balance) return alert("Invalid bet");

  balance -= amount;

  btn.classList.add("selected");

  bets.push({
    team,
    gameId: id,
    amount,
    odds,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderBets();
}

function cashOut(index) {

  let b = bets[index];
  if (b.status !== "ACTIVE") return;

  let payout = Math.floor(b.amount * b.odds);

  balance += payout;

  b.status = "CASHED OUT";

  save();
  updateUI();
  renderBets();
  renderHistory();
}

function renderBets() {

  let active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map((b, i) =>
          `
          ${b.team} - $${b.amount} (${b.odds}x)
          <button onclick="cashOut(${bets.indexOf(b)})">Cash Out</button>
          <br>
          `
        ).join("")
      : "No active bets";
}

function renderHistory() {

  let done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b =>
          `${b.team} - ${b.status} - $${b.amount}`
        ).join("<br>")
      : "No history";
}

function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m || b.status !== "ACTIVE") return;

    if (m.status === "FINISHED") {

      const home = m.score.fullTime.home;
      const away = m.score.fullTime.away;

      const winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.team === winner) {

        streak++;

        let payout = Math.floor(b.amount * b.odds);

        // streak bonus
        if (streak >= 3) payout *= 1.5;

        balance += payout;
        b.status = "WON";

      } else {
        streak = 0;
        b.status = "LOST";
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

setInterval(() => {
  loadMatches();
  checkResults();
}, 20000);

loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
