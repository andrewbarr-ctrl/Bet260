<!DOCTYPE html>
<html>
<head>
  <title>Bet260 ⚽</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f14;
      color: #e6e6e6;
      margin: 0;
      text-align: center;
    }

    h1 { color: #00ff88; }

    .nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #111821;
      position: sticky;
      top: 0;
    }

    .nav button {
      background: #00ff88;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .box {
      background: #151c24;
      margin: 10px auto;
      padding: 15px;
      width: 92%;
      max-width: 700px;
      border-radius: 12px;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 8px 10px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:disabled {
      background: #444;
      cursor: not-allowed;
    }

    .small {
      color: #aaa;
      font-size: 12px;
    }

    .selected {
      background: #ffd700 !important;
      color: #000;
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: none;
      width: 90px;
    }
  </style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance">Balance: $1000</h2>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('bets')">Bets</button>
  <button onclick="showTab('history')">History</button>
</div>

<!-- GAMES -->
<div id="gamesTab">
  <div class="box">
    <h3>Games</h3>
    <div id="games">Loading matches...</div>
  </div>
</div>

<!-- BETS -->
<div id="betsTab" style="display:none;">
  <div class="box">
    <h3>My Bets</h3>
    <div id="bets"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="historyTab" style="display:none;">
  <div class="box">
    <h3>History</h3>
    <div id="history"></div>
  </div>
</div>

<script>

const API_URL = "https://green-recipe-d6bd.andrewbarr.workers.dev/";

let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];
let matches = [];

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function updateUI() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

function showTab(tab) {
  document.getElementById("gamesTab").style.display = tab === "games" ? "block" : "none";
  document.getElementById("betsTab").style.display = tab === "bets" ? "block" : "none";
  document.getElementById("historyTab").style.display = tab === "history" ? "block" : "none";
}

// LOAD MATCHES FROM WORKER
async function loadMatches() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    matches = data.matches || [];
    renderMatches();

  } catch (err) {
    document.getElementById("games").innerHTML = "Failed to load matches";
  }
}

// RENDER MATCHES (BETTING LOCKED WHEN NOT TIMED)
function renderMatches() {
  let html = "";

  matches.forEach(m => {

    const home = m.score?.fullTime?.home ?? "-";
    const away = m.score?.fullTime?.away ?? "-";

    const alreadyBet = bets.find(b => b.gameId === m.id);

    // ONLY TIMED = BET ALLOWED
    const canBet = m.status === "TIMED";

    html += `
      <div class="box">
        <p><b>${m.homeTeam.name}</b> vs <b>${m.awayTeam.name}</b></p>

        <p>Status: ${m.status}</p>
        <p class="small">Score: ${home} - ${away}</p>

        <input type="number" id="amt-${m.id}" 
          value="100"
          min="1"
          max="${balance}"
          ${canBet ? "" : "disabled"}
        />

        <br/>

        <button
          class="${alreadyBet?.team === m.homeTeam.name ? 'selected' : ''}"
          ${(!canBet || alreadyBet) ? "disabled" : ""}
          onclick="placeBet('${m.homeTeam.name}', ${m.id})">
          ${m.homeTeam.name}
        </button>

        <button
          class="${alreadyBet?.team === m.awayTeam.name ? 'selected' : ''}"
          ${(!canBet || alreadyBet) ? "disabled" : ""}
          onclick="placeBet('${m.awayTeam.name}', ${m.id})">
          ${m.awayTeam.name}
        </button>

        ${!canBet ? `<p class="small">Betting closed</p>` : ""}
        ${alreadyBet ? `<p class="small">You bet: ${alreadyBet.team} ($${alreadyBet.amount})</p>` : ""}
      </div>
    `;
  });

  document.getElementById("games").innerHTML = html;
}

// PLACE BET (SAFE)
function placeBet(team, id) {

  const match = matches.find(m => m.id === id);

  if (!match || match.status !== "TIMED") {
    alert("Betting is closed!");
    return;
  }

  if (bets.find(b => b.gameId === id)) {
    alert("Already bet on this match!");
    return;
  }

  const input = document.getElementById("amt-" + id);
  let amount = Number(input.value);

  if (!amount || amount <= 0) {
    alert("Invalid amount");
    return;
  }

  if (amount > balance) {
    alert("Not enough balance!");
    return;
  }

  balance -= amount;

  bets.push({
    team,
    gameId: id,
    amount,
    status: "ACTIVE"
  });

  save();
  updateUI();
  renderMatches();
  renderBets();
}

// BETS
function renderBets() {
  const active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("bets").innerHTML =
    active.length
      ? active.map(b => `${b.team} - $${b.amount}`).join("<br>")
      : "No active bets";
}

// HISTORY
function renderHistory() {
  const done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("history").innerHTML =
    done.length
      ? done.map(b => `${b.team} - ${b.status} ($${b.amount})`).join("<br>")
      : "No history yet";
}

// CHECK RESULTS
function checkResults() {

  bets.forEach(b => {

    const m = matches.find(x => x.id === b.gameId);
    if (!m) return;

    if (m.status === "FINISHED" && b.status === "ACTIVE") {

      const home = m.score.fullTime.home;
      const away = m.score.fullTime.away;

      let winner =
        home > away ? m.homeTeam.name :
        away > home ? m.awayTeam.name :
        "DRAW";

      if (b.team === winner) {
        b.status = "WON";
        balance += b.amount * 2;
      } else {
        b.status = "LOST";
      }
    }
  });

  save();
  updateUI();
  renderBets();
  renderHistory();
}

// LOOP
setInterval(() => {
  loadMatches();
  checkResults();
}, 20000);

// START
loadMatches();
updateUI();
renderBets();
renderHistory();

</script>

</body>
</html>
