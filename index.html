<!DOCTYPE html>
<html>
<head>
<title>Bet260</title>

<style>
body {
  font-family: Arial;
  background: #0b0f14;
  color: #e6e6e6;
  margin: 0;
  text-align: center;
}

h1 { color: #00ff88; }

.nav button {
  background:#1a222d;
  color:white;
  border:none;
  padding:10px;
  margin:5px;
  border-radius:8px;
}

.box {
  background:#151c24;
  margin:10px auto;
  padding:15px;
  width:90%;
  max-width:600px;
  border-radius:12px;
}

button.bet {
  background:#00ff88;
  border:none;
  padding:8px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
}

button.bet:disabled {
  background:#555;
}

.small { color:#aaa; font-size:13px; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>Bet260 ⚽</h1>
<h2 id="balance"></h2>

<div class="nav">
  <button onclick="showTab('games')">Games</button>
  <button onclick="showTab('bets')">My Bets</button>
  <button onclick="showTab('history')">History</button>
</div>

<div id="games"></div>

<div id="bets" class="hidden">
  <div class="box">
    <h3>My Bets</h3>
    <div id="activeBets"></div>
  </div>
</div>

<div id="history" class="hidden">
  <div class="box">
    <h3>History</h3>
    <div id="historyList"></div>
  </div>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

// LOAD saved data (THIS FIXES RESET PROBLEM)
let balance = JSON.parse(localStorage.getItem("balance")) ?? 1000;
let bets = JSON.parse(localStorage.getItem("bets")) ?? [];

// WORLD CUP STYLE SCHEDULE
let games = [
  {id:1, home:"Argentina", away:"Algeria", status:"UPCOMING", start: Date.now()+15000},
  {id:2, home:"Brazil", away:"France", status:"UPCOMING", start: Date.now()+30000},
  {id:3, home:"USA", away:"Mexico", status:"UPCOMING", start: Date.now()+45000}
];

function save() {
  localStorage.setItem("balance", JSON.stringify(balance));
  localStorage.setItem("bets", JSON.stringify(bets));
}

function sound() {
  document.getElementById("clickSound").play();
}

function updateBalance() {
  document.getElementById("balance").innerText = "Balance: $" + balance;
}

function showTab(tab) {
  document.getElementById("games").classList.add("hidden");
  document.getElementById("bets").classList.add("hidden");
  document.getElementById("history").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

// RENDER GAMES
function renderGames() {
  let html = "";

  games.forEach(g => {

    let now = Date.now();

    if (now > g.start) g.status = "LIVE";
    if (now > g.start + 15000) g.status = "FINISHED";

    let disabled = (g.status !== "UPCOMING") ? "disabled" : "";

    html += `
    <div class="box">
      <h3>${g.home} vs ${g.away}</h3>
      <p>Status: ${g.status}</p>

      <button class="bet" ${disabled} onclick="bet('${g.home}', ${g.id})">
        Bet ${g.home} $100
      </button>

      <button class="bet" ${disabled} onclick="bet('${g.away}', ${g.id})">
        Bet ${g.away} $100
      </button>
    </div>`;
  });

  document.getElementById("games").innerHTML = html;
}

// BET SYSTEM
function bet(team, gameId) {
  if (balance < 100) return alert("Not enough money!");

  sound();

  balance -= 100;

  bets.push({
    team,
    gameId,
    amount:100,
    status:"ACTIVE"
  });

  save();
  updateBalance();
  renderBets();
}

// AUTO RESOLVE GAMES
function checkGames() {

  games.forEach(g => {

    if (g.status === "FINISHED") {

      bets.forEach(b => {

        if (b.gameId === g.id && b.status === "ACTIVE") {

          let winner = Math.random() > 0.5 ? g.home : g.away;

          if (b.team === winner) {
            b.status = "WON";
            balance += 200;
          } else {
            b.status = "LOST";
          }
        }
      });
    }
  });

  save();
  updateBalance();
  renderBets();
  renderHistory();
}

// BET LIST
function renderBets() {
  let active = bets.filter(b => b.status === "ACTIVE");

  document.getElementById("activeBets").innerHTML =
    active.length ? active.map(b => `${b.team} - $${b.amount}`).join("<br>") : "No active bets";
}

// HISTORY
function renderHistory() {
  let done = bets.filter(b => b.status !== "ACTIVE");

  document.getElementById("historyList").innerHTML =
    done.length ? done.map(b => `${b.team} - ${b.status}`).join("<br>") : "No history";
}

// LOOP (updates everything automatically)
setInterval(() => {
  renderGames();
  checkGames();
}, 2000);

// INIT
updateBalance();
renderGames();
renderBets();
renderHistory();

</script>

</body>
</html>
